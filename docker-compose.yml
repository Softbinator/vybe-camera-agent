services:
  camera-agent:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      # Mount your camera config (read-only)
      - ./config.yaml:/app/config.yaml:ro
      # Persistent volume for in-progress chunks waiting to be uploaded
      - camera_tmp:/tmp/vybe-camera-agent
    # Optional: uncomment if RTSP streams require host networking
    # network_mode: host

volumes:
  camera_tmp:
