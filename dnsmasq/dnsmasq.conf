# dnsmasq — DHCP-only (no DNS) for the vybe camera LAN.
# Serves leases on the interface named in LAN_IF (set via command-line --interface=).
# The install.sh script generates the docker-compose env so this conf can stay static.

# Disable DNS — we only want DHCP here.
port=0

# Only listen on the dedicated camera LAN interface. The compose runs with
# network_mode: host, so dnsmasq sees all host NICs — we must restrict it.
# install.sh substitutes <LAN_IF> at deploy time by mounting a rendered file,
# but the default value below works when the operator sets up the LAN on eth1.
bind-interfaces

# DHCP range. Leases are held for 24 h — cameras are static-ish, and anything
# removed from the LAN will drop its lease within a day.
dhcp-range=10.20.0.100,10.20.0.250,255.255.255.0,24h

# Point DHCP clients at the host as their default gateway (the NAT rule
# installed by nat/nat-setup.sh forwards their traffic to the WAN NIC).
dhcp-option=3,10.20.0.1

# Publicly reachable DNS resolvers so cameras can resolve NTP / firmware
# hosts without relying on us for name resolution.
dhcp-option=6,1.1.1.1,8.8.8.8

# Log each allocation so the agent (and humans) can trace discovery.
log-dhcp

# Persist leases in the shared volume so the agent's lan_discovery module
# can read them. The volume is mounted at /var/lib/misc in this container
# and /var/lib/dnsmasq in the agent container.
dhcp-leasefile=/var/lib/misc/dnsmasq.leases

# dnsmasq normally serves DNS on the host but we disabled it with `port=0`.
# Also suppress the upstream-resolvers check so we don't spam logs.
no-resolv
